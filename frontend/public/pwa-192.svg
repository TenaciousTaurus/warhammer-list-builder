<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0a0a0f"/>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="76" fill="none" stroke="#c9a84c" stroke-width="4"/>
  <!-- Gear teeth (8 teeth) -->
  <g fill="#c9a84c">
    <rect x="88" y="12" width="16" height="20" rx="3"/>
    <rect x="88" y="160" width="16" height="20" rx="3"/>
    <rect x="12" y="88" width="20" height="16" rx="3"/>
    <rect x="160" y="88" width="20" height="16" rx="3"/>
    <rect x="33" y="33" width="16" height="20" rx="3" transform="rotate(45 41 43)"/>
    <rect x="143" y="33" width="16" height="20" rx="3" transform="rotate(-45 151 43)"/>
    <rect x="33" y="139" width="16" height="20" rx="3" transform="rotate(-45 41 149)"/>
    <rect x="143" y="139" width="16" height="20" rx="3" transform="rotate(45 151 149)"/>
  </g>
  <!-- Inner circle -->
  <circle cx="96" cy="96" r="44" fill="#0a0a0f" stroke="#c9a84c" stroke-width="3"/>
  <!-- WF text -->
  <text x="96" y="113" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#c9a84c" text-anchor="middle" letter-spacing="-2">WF</text>
</svg>
