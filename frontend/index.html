<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
    <title>Warhammer 40K List Builder</title>
    <script>
      // Apply saved theme before first paint to prevent flash
      try {
        var stored = JSON.parse(localStorage.getItem('warforge-theme') || '{}');
        var s = stored.state;
        if (s && s.themeId && s.themeId !== 'void-dark') {
          document.documentElement.dataset.theme = s.themeId;
          // Apply custom inline colors if custom theme
          if (s.themeId === 'custom' && s.customTheme) {
            var vars = {
              accent: '--color-gold', accentDim: '--color-gold-dim',
              accentBright: '--color-gold-bright', bgPrimary: '--color-bg-primary',
              bgSecondary: '--color-bg-secondary', bgCard: '--color-bg-card',
              textPrimary: '--color-text-primary', textSecondary: '--color-text-secondary',
              border: '--color-border'
            };
            for (var k in s.customTheme) {
              if (vars[k] && s.customTheme[k]) {
                document.documentElement.style.setProperty(vars[k], s.customTheme[k]);
              }
            }
          }
        }
        if (s && s.fontSize && s.fontSize !== 100) {
          document.documentElement.style.setProperty('font-size', s.fontSize + '%');
        }
      } catch (e) { /* ignore */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
